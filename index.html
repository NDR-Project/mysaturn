<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Infinite Saturn Memory</title>
    <div id="intro-page">
    <h1>THE INFINITE MEMORY</h1>
    <p style="color: #666; margin-bottom: 30px;">Setiap bintang punya cerita...</p>
    <button id="start-btn" onclick="startExperience()">MULAI PERJALANAN</button>
</div>

    <style>
    /* Styling untuk halaman pembuka */
#intro-page {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
    display: flex; 
    flex-direction: column;
    align-items: center;      /* Mengetengahkan secara horizontal */
    justify-content: center;   /* Mengetengahkan secara vertikal */
    text-align: center;        /* Memastikan teks di dalam element ada di tengah */
    z-index: 9999; 
    transition: opacity 2.5s ease;
    padding: 20px;             /* Biar nggak mepet pinggir di HP */
    box-sizing: border-box;
}


#intro-page h1 {
    color: #f39c12; 
    font-family: 'Georgia', serif;
    font-size: 2.2rem;         /* Ukuran sedikit dikecilkan buat HP */
    letter-spacing: 3px; 
    margin: 0 0 10px 0;        /* Reset margin biar presisi */
    text-shadow: 0 0 15px rgba(243, 156, 18, 0.5);
    width: 100%;               /* Memastikan h1 mengambil lebar penuh agar text-align kerja */
}

#intro-page p {
    color: #888; 
    margin: 0 0 40px 0; 
    font-style: italic;
    width: 100%;
}
#start-btn {
    padding: 15px 40px; 
    background: transparent;
    border: 2px solid #f39c12; 
    color: #f39c12;
    font-family: 'Georgia', serif; 
    cursor: pointer;
    font-size: 1.2rem; 
    border-radius: 30px;
    transition: all 0.3s;
    
    /* Efek Fade In Otomatis */
    opacity: 0; /* Mulai dari transparan */
    animation: fadeInTombol 2s ease forwards; /* Durasi muncul 2 detik */
    animation-delay: 3s; /* Tunggu 5 detik baru mulai muncul */
}

/* Keyframes untuk animasi muncul */
@keyframes fadeInTombol {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

#start-btn:hover {
    background: #f39c12; 
    color: black;
    box-shadow: 0 0 20px #f39c12;
}


        body { margin: 0; overflow: hidden; background-color: #000; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #f39c12; font-family: 'Georgia', serif; text-align: center; z-index: 100;
        }
        #music-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            background: rgba(243, 156, 18, 0.2); border: 1px solid #f39c12;
            color: white; padding: 10px; border-radius: 50%; cursor: pointer;
            font-size: 20px; width: 50px; height: 50px; display: flex;
            align-items: center; justify-content: center; outline: none;
        }
       #notif-wa {
    /* Posisi & Ukuran */
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px); /* Mulai dari atas */
    width: 90%;
    max-width: 400px;
    height: auto;
    padding: 12px 16px;
    z-index: 10000;

    /* Desain ala iOS (Glassmorphism) */
    background: rgba(255, 255, 255, 0.7); /* Putih transparan */
    backdrop-filter: blur(15px);         /* Efek blur kaca */
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;                 /* Rounding khas iPhone */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);

    /* Animasi & Interaksi */
    display: flex;        /* Supaya icon & teks sejajar */
    align-items: center;
    gap: 12px;
    opacity: 0;           /* Default sembunyi */
    pointer-events: none; /* Biar ngga ngehalangi klik sebelum muncul */
    transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Animasi membal halus */
}

/* Tambahan styling untuk isi notif biar makin rapi */
#notif-wa img {
    width: 40px;
    height: 40px;
    border-radius: 10px;
}

#notif-wa .text-container {
    flex: 1;
}

#notif-wa .name {
    font-weight: 700;
    font-size: 14px;
    color: #000;
    margin: 0;
}

#notif-wa .msg {
    font-size: 13px;
    color: #333;
    margin: 2px 0 0 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}


.notif-title {
    color: #007AFF;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 2px;
    display: block;
}

.notif-text {
    color: #333;
    font-size: 13px;
}
/* Menghilangkan garis kotak saat tombol ditekan atau difokuskan */
button:focus, 
button:active {
    outline: none !important;
    -webkit-tap-highlight-color: transparent; /* Khusus buat HP biar nggak ada bayangan abu-abu pas di-tap */
}

/* Kalau mau bener-bener bersih untuk semua elemen */
* {
    -webkit-tap-highlight-color: transparent;
    outline: none !important;
}


    </style>
</head>
<body>
    <div id="loading"><h2>Menyempurnakan Visual Saturnus...</h2></div>
    <div id="notif-wa">
    <span class="notif-title">Sistem Saturnus</span>
    <span class="notif-text">Coba kamu geser-geser layarnya! 🪐</span>
</div>

    <audio id="bgMusic" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <button id="music-btn" onclick="toggleMusic()">🎵</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
      function startExperience() {
    // Sembunyikan halaman intro
    const intro = document.getElementById('intro-page');
    intro.style.opacity = '0';
    setTimeout(() => {
        intro.style.display = 'none';
    }, 2000);

    // Jalankan musik
    const bgMusic = document.getElementById('bgMusic');
    bgMusic.play();
    document.getElementById('music-btn').innerText = "🎶";
    setTimeout(() => {
    // 1. Ambil elemen notifnya
    const notif = document.getElementById('notif-wa');
    
    // 2. Play suaranya (Langsung bunyi pas notif muncul)
    const audio = new Audio('./notif.mp3');
    audio.volume = 0.5; 
    audio.play().catch(e => console.log("Audio diblokir browser:", e));

 // Eksekusi Muncul (Anti-Blink)
    // Kita panggil style-nya langsung, hilangkan display: block!
    notif.style.opacity = "1";
    notif.style.transform = "translateX(-50%) translateY(0)"; /* Turun ke posisi asli */
    notif.style.pointerEvents = "auto";
    // 4. Set timer buat ngilangin (setelah 4 detik muncul)
    setTimeout(() => {
        notif.style.opacity = '0';
        setTimeout(() => { 
            notif.style.display = 'none'; 
        }, 500);
    }, 4000);

}, 5000); //

    // Panggil init() jika belum jalan
    // init(); 
}

        let scene, camera, renderer, controls, clock;
        let saturnSystem = new THREE.Group();
        const audio = document.getElementById('bgMusic');
        
        // 1. Daftar 14 Foto Otomatis
        const PHOTO_URLS = [];
        for (let i = 1; i <= 2; i++) {
            PHOTO_URLS.push(`images/${i}.jpg`);
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById('music-btn').innerText = "🎶"; }
            else { audio.pause(); document.getElementById('music-btn').innerText = "🔇"; }
        }
        
        window.addEventListener('click', () => { if(audio.paused) audio.play(); }, { once: true });

        async function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(35, 25, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.3;

            scene.add(saturnSystem);

            // Lighting agar Planet terlihat
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
            sunLight.position.set(10, 10, 10);
            scene.add(sunLight);

            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');

            // 1. Planet Saturnus
            const planetGeo = new THREE.SphereGeometry(7, 64, 64);
            const planetMat = new THREE.MeshStandardMaterial({
                map: loader.load('2k_saturn.jpg'), 
                roughness: 1,
                metalness: 0
            });
            const planet = new THREE.Mesh(planetGeo, planetMat);
            saturnSystem.add(planet);

            // 2. Load 14 Foto dengan Anti-Stretch (Crop)
            PHOTO_URLS.forEach((url, i) => {
                loader.load(url, (tex) => {
                    // Logika Crop Center agar tidak penyet
                    const aspect = tex.image.width / tex.image.height;
                    if (aspect > 1) {
                        tex.repeat.set(1 / aspect, 1);
                        tex.offset.set((1 - 1 / aspect) / 2, 0);
                    } else {
                        tex.repeat.set(1, aspect);
                        tex.offset.set(0, (1 - aspect) / 2);
                    }

                    createGradedRing(tex, i);
                    createProximityStars(tex);
                }, undefined, (err) => {
                    console.warn("Gagal muat foto: " + url);
                });
            });

            saturnSystem.rotation.x = 0.40; 
            
            document.getElementById('loading').style.display = 'none';
            animate();
        }

        function createGradedRing(tex, index) {
    // 1. Tentukan jumlah partikel (kita pakai 15.000 per layer foto)
    const count = 15000; 
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    
    // 2. Setting dimensi Donat
    const ringRadius = 12 + (index * 0.9); // Jarak dari planet
    const tubeRadius = 0.8; // KETEBALAN donatnya (besarkan jika kurang gemuk)

    for (let i = 0; i < count; i++) {
        const i3 = i * 3;
        
        // Rumus matematika untuk menyebar titik di dalam volume donat (Torus)
        const u = Math.random() * Math.PI * 2; // Sudut keliling donat
        const v = Math.random() * Math.PI * 2; // Sudut tabung donat
        const r = Math.random() * tubeRadius;  // Jarak acak dari pusat tabung
        
        // Kalkulasi posisi X, Y, Z agar membentuk donat solid
        const x = (ringRadius + r * Math.cos(v)) * Math.cos(u);
        const y = r * Math.sin(v); // Ini yang bikin volume ke atas/bawah
        const z = (ringRadius + r * Math.cos(v)) * Math.sin(u);

        positions[i3] = x;
        positions[i3+1] = y;
        positions[i3+2] = z;
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    // 3. Pakai PointsMaterial agar fotonya jadi partikel kecil
    const mat = new THREE.PointsMaterial({
        size: 0.15, // Ukuran butiran foto
        map: tex,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
    });

    const cloud = new THREE.Points(geo, mat);
    saturnSystem.add(cloud);
}



        function createProximityStars(tex) {
            const starsPerCluster = 3000; 
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(starsPerCluster * 3);

            for (let i = 0; i < starsPerCluster; i++) {
                const i3 = i * 3;
                const r = 50 + (Math.random() * 1500); 
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                pos[i3] = r * Math.sin(phi) * Math.cos(theta);
                pos[i3+1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i3+2] = r * Math.cos(phi);
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const starMat = new THREE.PointsMaterial({
                size: 1.5, 
                map: tex,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true,
                color: new THREE.Color(1.5, 1.5, 1.5) // Glow untuk bintang
            });

            scene.add(new THREE.Points(geo, starMat));
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            saturnSystem.children.forEach((child, i) => {
                if (child instanceof THREE.Points) {
                    child.rotation.y = time * (0.15 + (i * 0.0005));
                }
            });
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        

        init();
    </script>
</body>
</html>
